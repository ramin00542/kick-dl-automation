name: Download (Split if Needed) & Upload to File Hosts

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک فایل (یا چند لینک با فاصله) - پشتیبانی از mega.nz'
        required: true
        type: string
      mode:
        description: 'حالت دانلود (normal یا zip)'
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      link_password:
        description: 'رمز لینک (HTTP Basic Auth) - اختیاری'
        required: false
        type: string
      file_password:
        description: 'رمز داخلی فایل (در password.txt ذخیره می‌شود) - اختیاری'
        required: false
        type: string
      target_sites:
        description: 'سایت‌های مقصد برای آپلود (با کاما جدا کنید)'
        required: true
        type: string
        default: 'erfanzadeh.ir'
      upload_mode:
        description: 'حالت آپلود (تک فایل کامل یا تکه تکه)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - parts
      credentials:
        description: |
          اعتبارنامه سایت‌ها – هر خط به فرمت:
          site:username:password   یا   site:guest
          مثال:
          erfanzadeh.ir:admin:admin
        required: false
        type: string
        default: ''
  push:
    branches:
      - "**"

jobs:
  process:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'github:') ||
      contains(github.event.head_commit.message, 'github-zip:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create log directory
        run: |
          mkdir -p logs
          LOG_FILE="logs/run_$(date +%Y%m%d_%H%M%S).log"
          echo "LOG_FILE=$LOG_FILE" >> $GITHUB_ENV
          echo "Starting workflow at $(date)" | tee -a "$LOG_FILE"
          echo "Event: ${{ github.event_name }}" | tee -a "$LOG_FILE"

      # FIX: Use latest chromedriver via npx/webdriver-manager instead of manual version matching
      - name: Install dependencies (Google Chrome + chromedriver + megatools)
        run: |
          set -e -x
          exec > >(tee -a "$LOG_FILE") 2>&1
          sudo apt-get update
          sudo apt-get install -y curl zip unzip wget megatools google-chrome-stable
          # FIX: Use chromedriver that matches installed Chrome automatically
          pip install selenium webdriver-manager
          # Pre-install chromedriver via webdriver-manager to avoid runtime delays
          python -c "from webdriver_manager.chrome import ChromeDriverManager; ChromeDriverManager().install()"
        env:
          LOG_FILE: ${{ env.LOG_FILE }}

      - name: Download, Split & Prepare Files
        run: |
          set -e -x
          exec > >(tee -a "$LOG_FILE") 2>&1
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            URLS="${{ github.event.inputs.url }}"
            LINK_PASS="${{ github.event.inputs.link_password }}"
            FILE_PASS="${{ github.event.inputs.file_password }}"
            echo "Mode: $MODE (manual trigger)"
          else
            if echo "$MSG" | grep -qP 'github-zip:'; then
              MODE="zip"
              URLS=$(echo "$MSG" | grep -oP 'github-zip:\s*\K.*')
            elif echo "$MSG" | grep -qP 'github:'; then
              MODE="normal"
              URLS=$(echo "$MSG" | grep -oP 'github:\s*\K.*')
            else
              echo "❌ No github command found in commit message"
              exit 1
            fi
            LINK_PASS=""
            FILE_PASS=""
            echo "Mode: $MODE (from commit)"
          fi

          mkdir -p tmp_downloads downloads

          for URL in $URLS; do
            echo "⬇️ Downloading $URL"
            cd tmp_downloads
            if [[ "$URL" == *"mega.nz"* ]]; then
              echo "MEGA link detected. Using megatools..."
              megatools dl --path . "$URL"
            else
              if [ -n "$LINK_PASS" ] && [[ "$LINK_PASS" == *:* ]]; then
                USER="${LINK_PASS%%:*}"
                PASS="${LINK_PASS#*:}"
                curl -L -u "$USER:$PASS" -O "$URL"
              else
                curl -L -O "$URL"
              fi
            fi
            cd ..
          done

          find tmp_downloads -type f -exec mv {} tmp_downloads/ \;
          rm -rf tmp_downloads/*/

          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
            rm -f tmp_downloads/*
            mv "$ARCHIVE_NAME" tmp_downloads/archive.zip
          fi

          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")
            BASENAME_CLEAN="${BASENAME%%\?*}"
            TARGET_DIR="downloads/${BASENAME_CLEAN}"
            mkdir -p "$TARGET_DIR"

            if [ -n "$LINK_PASS" ] || [ -n "$FILE_PASS" ]; then
              echo "--- Password Info ---" > "$TARGET_DIR/password.txt"
              [ -n "$LINK_PASS" ] && echo "Download password: $LINK_PASS" >> "$TARGET_DIR/password.txt"
              [ -n "$FILE_PASS" ] && echo "File password: $FILE_PASS" >> "$TARGET_DIR/password.txt"
            fi

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME_CLEAN is $(( SIZE / 1024 / 1024 ))MB — splitting into 90MB chunks"
              split -b 90M -d -a 2 "$FILE" "$TARGET_DIR/${BASENAME_CLEAN}.part"
              cat "$TARGET_DIR/${BASENAME_CLEAN}.part"* > "$TARGET_DIR/${BASENAME_CLEAN}.full"
            else
              cp "$FILE" "$TARGET_DIR/$BASENAME_CLEAN"
              cp "$FILE" "$TARGET_DIR/${BASENAME_CLEAN}.full"
            fi
          done

          rm -rf tmp_downloads
        env:
          LOG_FILE: ${{ env.LOG_FILE }}

      # FIX: Use upload_to_sites.py from repo directly (no heredoc = no indentation bug)
      # Make sure upload_to_sites.py is committed to your repo root!
      - name: Upload to selected sites
        # FIX: also run on push trigger (not just workflow_dispatch)
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.target_sites != '') ||
          (github.event_name == 'push' && (
            contains(github.event.head_commit.message, 'github:') ||
            contains(github.event.head_commit.message, 'github-zip:')
          ))
        env:
          TARGET_SITES: ${{ github.event.inputs.target_sites || 'erfanzadeh.ir' }}
          CREDENTIALS: ${{ github.event.inputs.credentials || '' }}
          UPLOAD_MODE: ${{ github.event.inputs.upload_mode || 'full' }}
          LOG_FILE: ${{ env.LOG_FILE }}
        run: |
          set -e -x
          exec > >(tee -a "$LOG_FILE") 2>&1

          if [ "$UPLOAD_MODE" = "full" ]; then
            FILES_TO_UPLOAD=$(find downloads -type f -name "*.full" | head -1)
            if [ -z "$FILES_TO_UPLOAD" ]; then
              FILES_TO_UPLOAD=$(find downloads -type f \
                ! -name "*.bat" ! -name "*.command" ! -name "*.sh" \
                ! -name "password.txt" ! -name "reconstruct_all.sh" | head -1)
            fi
            if [ -z "$FILES_TO_UPLOAD" ]; then
              echo "❌ No file found to upload" | tee -a "$LOG_FILE"
              exit 1
            fi
            echo "Uploading full file: $FILES_TO_UPLOAD" | tee -a "$LOG_FILE"
            python upload_to_sites.py \
              --file "$FILES_TO_UPLOAD" \
              --sites "$TARGET_SITES" \
              --creds "$CREDENTIALS" 2>&1 | tee -a "$LOG_FILE"
          else
            PART_FILES=$(find downloads -type f -name "*.part*" | sort)
            if [ -z "$PART_FILES" ]; then
              echo "❌ No part files found to upload" | tee -a "$LOG_FILE"
              exit 1
            fi
            for PART in $PART_FILES; do
              echo "Uploading part file: $PART" | tee -a "$LOG_FILE"
              python upload_to_sites.py \
                --file "$PART" \
                --sites "$TARGET_SITES" \
                --creds "$CREDENTIALS" 2>&1 | tee -a "$LOG_FILE"
            done
          fi

      - name: Upload log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Commit & Push
        if: success() || failure()
        run: |
          set -e -x
          exec > >(tee -a "$LOG_FILE") 2>&1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/ upload_results.txt logs/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Download and upload results [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || echo "Rebase failed"
            git push || echo "Push failed"
          else
            echo "No changes to commit"
          fi
        env:
          LOG_FILE: ${{ env.LOG_FILE }}
