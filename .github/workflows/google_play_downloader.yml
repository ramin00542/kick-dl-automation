name: دانلود فایل نصبی گوگل پلی (APK)

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'نام بسته (مثل com.google.android.youtube)'
        required: true
        type: string
      architecture:
        description: 'معماری هدف'
        required: true
        type: choice
        default: 'arm64'
        options:
          - arm64
          - armv7
          - x86
          - x86_64
      merge_splits:
        description: 'ادغام Split APK در یک فایل نهایی؟'
        required: false
        type: boolean
        default: true
      file_password:
        description: 'رمز (پسورد) فایل APK (در صورت نیاز) - در password.txt ذخیره می‌شود'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  download-apk:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # رفع اخطار Node.js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: نصب پیش‌نیازها
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip openjdk-17-jre-headless
          pip3 install gplaycli

      - name: تنظیم اعتبارنامه (Token) گوگل پلی
        run: |
          # ابتدا باید یک فایل gplaycli.conf را در secrets خود ذخیره کرده باشید
          if [ -z "${{ secrets.GPLAYCLI_CONF }}" ]; then
            echo "❌ خطا: متغیر secret به نام GPLAYCLI_CONF یافت نشد."
            echo "راهنما: https://github.com/matlink/gplaycli"
            exit 1
          fi
          echo "${{ secrets.GPLAYCLI_CONF }}" > ~/.config/gplaycli/gplaycli.conf
          cat ~/.config/gplaycli/gplaycli.conf

      - name: دانلود APK با gplaycli
        id: download
        run: |
          mkdir -p downloads/GooglePlay
          PACKAGE="${{ inputs.package_name }}"
          ARCH="${{ inputs.architecture }}"
          MERGE="${{ inputs.merge_splits }}"

          # پوشه موقت برای دانلود
          mkdir -p tmp_apk
          cd tmp_apk

          if [ "$MERGE" = "true" ]; then
            # دانلود و ادغام خودکار (gplaycli قابلیت merge دارد)
            gplaycli -p "$PACKAGE" -a "$ARCH" -m -o ./
            DOWNLOADED_FILE=$(ls -1 *.apk 2>/dev/null | head -n1)
          else
            # دانلود split files به صورت ZIP
            gplaycli -p "$PACKAGE" -a "$ARCH" -o ./
            DOWNLOADED_FILE=$(ls -1 *.zip 2>/dev/null | head -n1)
          fi

          if [ -z "$DOWNLOADED_FILE" ]; then
            echo "❌ دانلود انجام نشد. شاید نام بسته یا معماری اشتباه است؟"
            exit 1
          fi

          echo "downloaded_file=$(pwd)/$DOWNLOADED_FILE" >> $GITHUB_OUTPUT
          echo "downloaded_name=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT

      - name: مرتب‌سازی و تقسیم فایل (مشابه MEGA)
        run: |
          DOWNLOADED_FILE="${{ steps.download.outputs.downloaded_file }}"
          BASENAME=$(basename "$DOWNLOADED_FILE")
          PACKAGE="${{ inputs.package_name }}"
          ARCH="${{ inputs.architecture }}"
          TARGET_DIR="downloads/GooglePlay/${PACKAGE}_${ARCH}"
          mkdir -p "$TARGET_DIR"

          # اگر رمز فایل وارد شده، در password.txt ذخیره کن
          if [ -n "${{ inputs.file_password }}" ]; then
            echo "رمز فایل: ${{ inputs.file_password }}" > "$TARGET_DIR/password.txt"
          fi

          SIZE=$(stat -c%s "$DOWNLOADED_FILE")
          LIMIT=$((90 * 1024 * 1024))  # 90 مگابایت

          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "✂️ فایل $BASENAME ( $(($SIZE / 1024 / 1024)) مگابایت) به بخش‌های 90 مگابایتی تقسیم می‌شود..."
            split -b 90M -d -a 2 "$DOWNLOADED_FILE" "$TARGET_DIR/${BASENAME}.part"

            # --- ساخت اسکریپت بازسازی (merge) ---
            # ویندوز (merge.bat)
            printf '@echo off\r\n' > "$TARGET_DIR/merge.bat"
            printf 'echo در حال بازسازی %s ...\r\n' "$BASENAME" >> "$TARGET_DIR/merge.bat"
            printf 'copy /b "%s.part*" "%s" > nul\r\n' "$BASENAME" "$BASENAME" >> "$TARGET_DIR/merge.bat"
            printf 'if errorlevel 1 (\r\n' >> "$TARGET_DIR/merge.bat"
            printf '  echo ❌ خطا در بازسازی\r\n' >> "$TARGET_DIR/merge.bat"
            printf '  pause\r\n' >> "$TARGET_DIR/merge.bat"
            printf '  exit /b 1\r\n' >> "$TARGET_DIR/merge.bat"
            printf ')\r\n' >> "$TARGET_DIR/merge.bat"
            printf 'echo ✅ فایل %s بازسازی شد\r\n' "$BASENAME" >> "$TARGET_DIR/merge.bat"
            printf 'pause\r\n' >> "$TARGET_DIR/merge.bat"

            # مک (merge.command)
            printf '#!/bin/bash\n' > "$TARGET_DIR/merge.command"
            printf 'cd "$(dirname "$0")"\n' >> "$TARGET_DIR/merge.command"
            printf 'echo "بازسازی %s ..."\n' "$BASENAME" >> "$TARGET_DIR/merge.command"
            printf 'cat "%s.part"* > "%s"\n' "$BASENAME" "$BASENAME" >> "$TARGET_DIR/merge.command"
            printf 'if [ $? -eq 0 ]; then\n' >> "$TARGET_DIR/merge.command"
            printf '  echo "✅ فایل %s بازسازی شد"\n' "$BASENAME" >> "$TARGET_DIR/merge.command"
            printf 'else\n' >> "$TARGET_DIR/merge.command"
            printf '  echo "❌ خطا"\n' >> "$TARGET_DIR/merge.command"
            printf 'fi\n' >> "$TARGET_DIR/merge.command"
            printf 'read -p "Enter را بزنید..."\n' >> "$TARGET_DIR/merge.command"
            chmod +x "$TARGET_DIR/merge.command"

            # لینوکس (merge.sh)
            printf '#!/bin/bash\n' > "$TARGET_DIR/merge.sh"
            printf 'cd "$(dirname "$0")"\n' >> "$TARGET_DIR/merge.sh"
            printf 'cat "%s.part"* > "%s"\n' "$BASENAME" "$BASENAME" >> "$TARGET_DIR/merge.sh"
            printf 'echo "✅ %s بازسازی شد"\n' "$BASENAME" >> "$TARGET_DIR/merge.sh"
            chmod +x "$TARGET_DIR/merge.sh"
          else
            echo "📄 فایل کوچک است، بدون تقسیم کپی می‌شود"
            cp "$DOWNLOADED_FILE" "$TARGET_DIR/$BASENAME"
          fi

          # پاکسازی فایل موقت
          rm -rf tmp_apk

      - name: ساخت اسکریپت بازسازی یکجا (اختیاری)
        run: |
          MASTER_SCRIPT="downloads/GooglePlay/reconstruct_all.sh"
          printf '#!/bin/bash\n' > "$MASTER_SCRIPT"
          printf 'echo "جستجوی پوشه‌های دارای فایل‌های تقسیم شده..."\n' >> "$MASTER_SCRIPT"
          printf 'for dir in */; do\n' >> "$MASTER_SCRIPT"
          printf '    if [ -d "$dir" ] && [ -f "$dir/merge.sh" ]; then\n' >> "$MASTER_SCRIPT"
          printf '        echo "🔄 بازسازی در $dir"\n' >> "$MASTER_SCRIPT"
          printf '        (cd "$dir" && bash merge.sh)\n' >> "$MASTER_SCRIPT"
          printf '    fi\n' >> "$MASTER_SCRIPT"
          printf 'done\n' >> "$MASTER_SCRIPT"
          printf 'echo "✅ همه فایل‌ها بازسازی شدند"\n' >> "$MASTER_SCRIPT"
          chmod +x "$MASTER_SCRIPT"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/GooglePlay/
          git commit -m "دانلود ${{ inputs.package_name }} (${{ inputs.architecture }}) از گوگل پلی [skip ci]" || echo "هیچ تغییری وجود ندارد"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}
