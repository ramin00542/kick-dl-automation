name: Download from MEGA.nz (with LFS support)

on:
  workflow_dispatch:
    inputs:
      mega_link:
        description: 'لینک فایل در MEGA (مثال: https://mega.nz/file/... )'
        required: true
        type: string
  push:
    branches:
      - "**"

jobs:
  download-mega:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'mega:')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install megatools
        run: |
          sudo apt-get update
          sudo apt-get install -y megatools

      - name: Get MEGA link (from manual input or commit message)
        id: get-link
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LINK="${{ github.event.inputs.mega_link }}"
            echo "✅ لینک از ورودی دستی: $LINK"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            LINK=$(echo "$COMMIT_MSG" | grep -oP 'mega:\s*\K.*' | xargs)
            if [ -z "$LINK" ]; then
              echo "❌ لینک MEGA در پیام commit یافت نشد (الگو: mega: لینک)"
              exit 1
            fi
            echo "✅ لینک از پیام commit: $LINK"
          fi
          echo "url=$LINK" >> $GITHUB_OUTPUT

      - name: Download file from MEGA
        run: |
          mkdir -p downloads
          cd downloads
          megatools dl --path . "${{ steps.get-link.outputs.url }}"
          cd ..

      - name: Check file size and prepare LFS if needed
        run: |
          FILE=$(ls downloads/* 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE")
            SIZE_MB=$((SIZE / 1048576))
            echo "📦 حجم فایل: ${SIZE_MB} مگابایت"
            if [ $SIZE_MB -gt 100 ]; then
              echo "⚠️ فایل بزرگتر از 100 مگابایت است. برای موفقیت در push، حتماً Git LFS باید در مخزن فعال باشد."
              echo "در غیر این صورت، push با خطا مواجه می‌شود."
            fi
          fi

      - name: Commit and push downloaded file (force add to bypass .gitignore)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(ls -A downloads 2>/dev/null)" ]; then
            git add -f downloads/
            git commit -m "افزودن فایل دانلود شده از MEGA [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "هیچ فایلی دانلود نشد."
          fi
