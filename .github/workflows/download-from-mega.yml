name: Download from MEGA & Save to Repo

on:
  workflow_dispatch:
    inputs:
      mega_link:
        description: 'لینک فایل یا پوشه در MEGA (چندتا لینک با فاصله مجاز است)'
        required: true
        type: string
      mode:
        description: 'حالت دانلود (normal یا zip)'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
  push:
    branches:
      - "**"

jobs:
  save-file:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'mega:') ||
      contains(github.event.head_commit.message, 'mega-zip:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install megatools
        run: sudo apt-get update && sudo apt-get install -y megatools

      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            URLS="${{ github.event.inputs.mega_link }}"
            echo "Mode: $MODE (manual trigger)"
          else
            if echo "$MSG" | grep -qP 'mega-zip:'; then
              MODE="zip"
              URLS=$(echo "$MSG" | grep -oP 'mega-zip:\s*\K.*')
            elif echo "$MSG" | grep -qP 'mega:'; then
              MODE="normal"
              URLS=$(echo "$MSG" | grep -oP 'mega:\s*\K.*')
            else
              echo "❌ No mega command found in commit message"
              exit 1
            fi
            echo "Mode: $MODE (from commit)"
          fi

          mkdir -p downloads tmp_downloads

          # پردازش هر URL به صورت مجزا
          for URL in $URLS; do
            echo "⬇️ Downloading $URL using megatools"
            cd tmp_downloads
            if ! megatools dl "$URL"; then
              echo "❌ Download failed for $URL"
              exit 1
            fi
            cd ..
          done

          # --- 1. حل مشکل پوشه: همه فایل‌ها را از زیرپوشه‌ها بیرون می‌کشیم ---
          find tmp_downloads -type f -exec mv {} tmp_downloads/ \;
          rm -rf tmp_downloads/*/  # حذف پوشه‌های خالی

          # --- 2. حل مشکل zip mode: فقط آرشیو نهایی نگه داشته شود ---
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
            rm -f tmp_downloads/*  # حذف همه فایل‌های اصلی (فقط زیپ بماند)
            # اطمینان از وجود فقط یک فایل
            mv "$ARCHIVE_NAME" tmp_downloads/archive.zip
          fi

          # --- 3. اسپلیت فایل‌های بزرگ با دستور split (نه zip -s) ---
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting into 90MB chunks using split..."
              # split -b 90M -d -a 2 "$FILE" "downloads/${BASENAME}.part"
              split -b 90M -d -a 2 "$FILE" "downloads/${BASENAME}.part"
              # تعداد بخش‌های ایجاد شده
              PARTS=$(ls downloads/${BASENAME}.part* | wc -l)
              echo "✅ Created $PARTS parts: downloads/${BASENAME}.part00 ..."
              # ایجاد فایل راهنما برای جمع کردن مجدد
              cat > "downloads/${BASENAME}_merge.sh" << EOF
#!/bin/bash
# برای بازسازی فایل اصلی، این بخش‌ها را با دستور زیر جمع کنید:
cat ${BASENAME}.part* > ${BASENAME}
EOF
              chmod +x "downloads/${BASENAME}_merge.sh"
            else
              cp "$FILE" "downloads/$BASENAME"
            fi
          done

          rm -rf tmp_downloads

      - name: Commit & Push (single commit to avoid race condition)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # اضافه کردن همه فایل‌های جدید/تغییر یافته در پوشه downloads
          git add downloads/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Add files from MEGA ($MODE mode) [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"

          echo "🎉 All files pushed successfully"
