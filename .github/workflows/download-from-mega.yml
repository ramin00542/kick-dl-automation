name: Download from MEGA.nz (Manual Link Input)

on:
  workflow_dispatch:
    inputs:
      mega_link:
        description: 'لینک فایل در MEGA (مثال: https://mega.nz/file/... )'
        required: true
        type: string
  push:
    branches:
      - "**"

jobs:
  download-mega:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'mega:')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install megatools
        run: |
          sudo apt-get update
          sudo apt-get install -y megatools

      - name: Get MEGA link (from manual input or commit message)
        id: get-link
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LINK="${{ github.event.inputs.mega_link }}"
            echo "✅ لینک از ورودی دستی: $LINK"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            LINK=$(echo "$COMMIT_MSG" | grep -oP 'mega:\s*\K.*' | xargs)
            if [ -z "$LINK" ]; then
              echo "❌ لینک MEGA در پیام commit یافت نشد (الگو: mega: لینک)"
              exit 1
            fi
            echo "✅ لینک از پیام commit: $LINK"
          fi
          echo "url=$LINK" >> $GITHUB_OUTPUT

      - name: Download file from MEGA
        run: |
          mkdir -p downloads
          cd downloads
          megatools dl --path . "${{ steps.get-link.outputs.url }}"
          cd ..

      - name: Check file size and warn if exceeding 100MB
        run: |
          FILE_SIZE=$(stat -c%s downloads/* 2>/dev/null | head -1)
          if [ -n "$FILE_SIZE" ] && [ "$FILE_SIZE" -gt 104857600 ]; then
            echo "⚠️ اندازه فایل دانلود شده $(($FILE_SIZE / 1048576)) مگابایت است که از حد مجاز گیت‌هاب (100 مگابایت) بیشتر است."
            echo "مخزن گیت‌هاب فایل‌های بزرگتر از 100 مگابایت را قبول نمی‌کند. پیشنهاد می‌کنم از Git LFS استفاده کنید یا فایل را در جای دیگری ذخیره کنید."
            echo "در غیر این صورت، push با خطا مواجه خواهد شد."
          fi

      - name: Commit and push downloaded file (force add to bypass .gitignore)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(ls -A downloads 2>/dev/null)" ]; then
            # استفاده از -f برای override .gitignore
            git add -f downloads/
            git commit -m "افزودن فایل دانلود شده از MEGA [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "هیچ فایلی دانلود نشد."
          fi
