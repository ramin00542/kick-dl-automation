name: Download from MEGA & Save to Repo (with LFS, clean)

on:
  workflow_dispatch:
    inputs:
      mega_link:
        description: 'لینک فایل در MEGA'
        required: true
        type: string
      mode:
        description: 'حالت (normal یا zip)'
        default: 'normal'
        type: choice
        options: ['normal', 'zip']
  push:
    branches:
      - "**"

jobs:
  save-file:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'mega:') ||
      contains(github.event.head_commit.message, 'mega-zip:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install megatools
        run: sudo apt-get update && sudo apt-get install -y megatools

      - name: Get MEGA link and mode
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            URL="${{ github.event.inputs.mega_link }}"
          else
            MSG=$(git log -1 --pretty=%B)
            if echo "$MSG" | grep -q 'mega-zip:'; then
              MODE="zip"
              URL=$(echo "$MSG" | grep -oP 'mega-zip:\s*\K.*' | awk '{print $1}')
            else
              MODE="normal"
              URL=$(echo "$MSG" | grep -oP 'mega:\s*\K.*' | awk '{print $1}')
            fi
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Mode: $MODE, URL: $URL"

      - name: Clean previous downloads (if any)
        run: |
          rm -rf downloads
          mkdir -p downloads

      - name: Download file from MEGA
        run: |
          cd downloads
          megatools dl "${{ steps.params.outputs.url }}"
          cd ..

      - name: If zip mode, compress all downloaded files
        if: steps.params.outputs.mode == 'zip'
        run: |
          cd downloads
          zip -r ../all_files.zip .
          cd ..
          mv all_files.zip downloads/

      - name: Commit and push (using LFS, no splitting)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --staged --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add file from MEGA [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          fi
