name: Download from MEGA & Save to Repo

on:
  workflow_dispatch:
    inputs:
      mega_link:
        description: 'لینک فایل یا پوشه در MEGA (چندتا لینک با فاصله مجاز است)'
        required: true
        type: string
      mode:
        description: 'حالت دانلود (normal یا zip)'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
  push:
    branches:
      - "**"

jobs:
  save-file:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # رفع اخطار Node.js 20
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'mega:') ||
      contains(github.event.head_commit.message, 'mega-zip:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install megatools
        run: sudo apt-get update && sudo apt-get install -y megatools

      - name: Extract URLs and download files
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            URLS="${{ github.event.inputs.mega_link }}"
            echo "Mode: $MODE (manual trigger)"
          else
            if echo "$MSG" | grep -qP 'mega-zip:'; then
              MODE="zip"
              URLS=$(echo "$MSG" | grep -oP 'mega-zip:\s*\K.*')
            elif echo "$MSG" | grep -qP 'mega:'; then
              MODE="normal"
              URLS=$(echo "$MSG" | grep -oP 'mega:\s*\K.*')
            else
              echo "❌ No mega command found in commit message"
              exit 1
            fi
            echo "Mode: $MODE (from commit)"
          fi

          mkdir -p tmp_downloads downloads/MEGA

          # Download all URLs
          for URL in $URLS; do
            echo "⬇️ Downloading $URL using megatools"
            cd tmp_downloads
            if ! megatools dl "$URL"; then
              echo "❌ Download failed for $URL"
              exit 1
            fi
            cd ..
          done

          # Flatten subfolders (for MEGA folder links)
          find tmp_downloads -type f -exec mv {} tmp_downloads/ \;
          rm -rf tmp_downloads/*/

          # Zip mode: keep only final archive
          if [ "$MODE" = "zip" ]; then
            ARCHIVE_NAME="tmp_downloads/archive_$(date +%Y%m%d_%H%M%S).zip"
            zip -j "$ARCHIVE_NAME" tmp_downloads/*
            rm -f tmp_downloads/*
            mv "$ARCHIVE_NAME" tmp_downloads/archive.zip
          fi

          # Process each downloaded file
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            LIMIT=$((90 * 1024 * 1024))
            BASENAME=$(basename "$FILE")

            TARGET_DIR="downloads/MEGA/$BASENAME"
            mkdir -p "$TARGET_DIR"

            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "✂️ $BASENAME is $(( SIZE / 1024 / 1024 ))MB — splitting into 90MB chunks in $TARGET_DIR"
              split -b 90M -d -a 2 "$FILE" "$TARGET_DIR/${BASENAME}.part"

              # --- Create merge scripts (no heredoc) ---
              # 1. Windows .bat (double-click)
              printf '@echo off\r\n' > "$TARGET_DIR/merge.bat"
              printf 'echo Reconstructing %s ...\r\n' "$BASENAME" >> "$TARGET_DIR/merge.bat"
              printf 'copy /b "%s.part*" "%s" > nul\r\n' "$BASENAME" "$BASENAME" >> "$TARGET_DIR/merge.bat"
              printf 'if errorlevel 1 (\r\n' >> "$TARGET_DIR/merge.bat"
              printf '  echo ❌ Error: Failed to reconstruct %s\r\n' "$BASENAME" >> "$TARGET_DIR/merge.bat"
              printf '  pause\r\n' >> "$TARGET_DIR/merge.bat"
              printf '  exit /b 1\r\n' >> "$TARGET_DIR/merge.bat"
              printf ')\r\n' >> "$TARGET_DIR/merge.bat"
              printf 'echo ✅ File %s reconstructed successfully.\r\n' "$BASENAME" >> "$TARGET_DIR/merge.bat"
              printf 'pause\r\n' >> "$TARGET_DIR/merge.bat"

              # 2. macOS .command (double-click opens Terminal)
              printf '#!/bin/bash\n' > "$TARGET_DIR/merge.command"
              printf 'cd "$(dirname "$0")"\n' >> "$TARGET_DIR/merge.command"
              printf 'echo "Reconstructing %s ..."\n' "$BASENAME" >> "$TARGET_DIR/merge.command"
              printf 'cat "%s.part"* > "%s"\n' "$BASENAME" "$BASENAME" >> "$TARGET_DIR/merge.command"
              printf 'if [ $? -eq 0 ]; then\n' >> "$TARGET_DIR/merge.command"
              printf '  echo "✅ File %s reconstructed successfully."\n' "$BASENAME" >> "$TARGET_DIR/merge.command"
              printf 'else\n' >> "$TARGET_DIR/merge.command"
              printf '  echo "❌ Error: Failed to reconstruct %s"\n' "$BASENAME" >> "$TARGET_DIR/merge.command"
              printf '  exit 1\n' >> "$TARGET_DIR/merge.command"
              printf 'fi\n' >> "$TARGET_DIR/merge.command"
              printf 'echo "Press any key to close..."\n' >> "$TARGET_DIR/merge.command"
              printf 'read -n 1\n' >> "$TARGET_DIR/merge.command"
              chmod +x "$TARGET_DIR/merge.command"

              # 3. Linux/Unix .sh (terminal)
              printf '#!/bin/bash\n' > "$TARGET_DIR/merge.sh"
              printf 'cd "$(dirname "$0")"\n' >> "$TARGET_DIR/merge.sh"
              printf 'cat "%s.part"* > "%s"\n' "$BASENAME" "$BASENAME" >> "$TARGET_DIR/merge.sh"
              printf 'echo "✅ %s reconstructed"\n' "$BASENAME" >> "$TARGET_DIR/merge.sh"
              chmod +x "$TARGET_DIR/merge.sh"

            else
              echo "📄 Copying $BASENAME to $TARGET_DIR"
              cp "$FILE" "$TARGET_DIR/$BASENAME"
            fi
          done

          # --- Master reconstruct script for Unix (reconstruct all at once) ---
          MASTER_SCRIPT="downloads/MEGA/reconstruct_all.sh"
          printf '#!/bin/bash\n' > "$MASTER_SCRIPT"
          printf 'set -e\n' >> "$MASTER_SCRIPT"
          printf 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"\n' >> "$MASTER_SCRIPT"
          printf 'cd "$SCRIPT_DIR"\n' >> "$MASTER_SCRIPT"
          printf 'echo "🔍 Scanning for folders containing split files..."\n' >> "$MASTER_SCRIPT"
          printf 'for dir in */; do\n' >> "$MASTER_SCRIPT"
          printf '    if [ -d "$dir" ] && [ -f "$dir/merge.sh" ]; then\n' >> "$MASTER_SCRIPT"
          printf '        echo "🔄 Reconstructing in $dir"\n' >> "$MASTER_SCRIPT"
          printf '        (cd "$dir" && bash merge.sh)\n' >> "$MASTER_SCRIPT"
          printf '    fi\n' >> "$MASTER_SCRIPT"
          printf 'done\n' >> "$MASTER_SCRIPT"
          printf 'echo "✅ All files reconstructed successfully."\n' >> "$MASTER_SCRIPT"
          chmod +x "$MASTER_SCRIPT"

          rm -rf tmp_downloads

      - name: Commit & Push (single commit)
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Add files from MEGA ($MODE mode) [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"

          echo "🎉 All files pushed successfully in downloads/MEGA/ organized by file name"
