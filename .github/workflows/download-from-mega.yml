name: Download from MEGA.nz

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  download-mega:
    if: |
      github.event_name == 'work_dispatch' ||
      contains(github.event.head_commit.message, 'mega:')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install megatools
        run: |
          sudo apt-get update
          sudo apt-get install -y megatools

      - name: Extract MEGA link from commit message
        id: link
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          MEGA_URL=$(echo "$COMMIT_MSG" | grep -oP 'mega:\s*\K.*' | xargs)
          if [ -z "$MEGA_URL" ]; then
            echo "❌ لینک MEGA در پیام commit یافت نشد"
            exit 1
          fi
          echo "url=$MEGA_URL" >> $GITHUB_OUTPUT
          echo "لینک: $MEGA_URL"

      - name: Download file from MEGA
        run: |
          mkdir -p downloads
          cd downloads
          megatools dl --path . "${{ steps.link.outputs.url }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(ls -A downloads 2>/dev/null)" ]; then
            git add downloads/
            git commit -m "افزودن فایل دانلود شده از MEGA [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "هیچ فایلی دانلود نشد."
          fi
