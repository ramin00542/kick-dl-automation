name: دانلود هر اپلیکیشن از گوگل پلی

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'نام بسته (مثال: com.instagram.android) یا لینک کامل گوگل پلی'
        required: true
        default: 'com.instagram.android'
        type: string

jobs:
  download-apk:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4

      - name: نصب Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: دانلود و نصب PlayRetrieve
        run: |
          git clone https://github.com/MuhammadKhizerJaved/PlayRetrieve.git
          cd PlayRetrieve
          pip install -r requirements.txt

      - name: استخراج شناسه بسته از لینک (اگر کاربر لینک کامل داده باشد)
        id: extract
        run: |
          INPUT="${{ inputs.package_name }}"
          # حذف فاصله‌ها و کاراکترهای اضافی
          INPUT=$(echo "$INPUT" | xargs)
          if [[ "$INPUT" == *"play.google.com"* ]]; then
            PACKAGE=$(echo "$INPUT" | grep -oP '(?<=id=)[^&?]+')
          else
            PACKAGE="$INPUT"
          fi
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "Extracted package: $PACKAGE"

      - name: دانلود APK
        run: |
          cd PlayRetrieve
          python PlayRetrieve.py -p ${{ steps.extract.outputs.package }} --arch arm64-v8a --device phone

      - name: ایجاد ساختار پوشه‌ها و انتقال فایل
        run: |
          APP_NAME="${{ steps.extract.outputs.package }}"
          TARGET_DIR="downloads/Google Play/${APP_NAME}"
          mkdir -p "${TARGET_DIR}"
          
          DOWNLOADED_FILE=$(find PlayRetrieve -type f \( -name "*.apk" -o -name "*.xapk" -o -name "*.apks" \) | head -n 1)
          if [ -f "$DOWNLOADED_FILE" ]; then
            mv -v "$DOWNLOADED_FILE" "${TARGET_DIR}/"
            echo "فایل به ${TARGET_DIR} منتقل شد."
          else
            echo "هیچ فایل APK یافت نشد!"
            exit 1
          fi

      - name: بارگذاری کل پوشه downloads به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.extract.outputs.package }}
          path: downloads/
