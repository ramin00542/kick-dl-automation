name: دانلود هر اپلیکیشن از گوگل پلی

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'نام بسته (Package Name) اپلیکیشن مورد نظر'
        required: true
        default: 'com.instagram.android'
        type: string

jobs:
  download-apk:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4

      - name: نصب Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: دانلود و نصب PlayRetrieve
        run: |
          git clone https://github.com/MuhammadKhizerJaved/PlayRetrieve.git
          cd PlayRetrieve
          pip install -r requirements.txt

      - name: دانلود APK
        run: |
          cd PlayRetrieve
          python PlayRetrieve.py -p ${{ inputs.package_name }} --arch arm64-v8a --device phone

      - name: انتقال فایل به پوشه downloads
        run: |
          mkdir -p downloads
          # پیدا کردن تمام فایل‌های apk/xapk/apks در کل درخت PlayRetrieve
          find PlayRetrieve -type f \( -name "*.apk" -o -name "*.xapk" -o -name "*.apks" \) -exec cp -v {} downloads/ \;

      - name: بارگذاری فایل به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.package_name }}
          path: downloads/
