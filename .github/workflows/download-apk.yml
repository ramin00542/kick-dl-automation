name: دانلود هر اپلیکیشن از گوگل پلی (apkeep)

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'نام بسته (مثال: com.instagram.android) یا لینک کامل گوگل پلی'
        required: true
        default: 'com.instagram.android'
        type: string

jobs:
  download-apk:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4

      - name: نصب apkeep
        run: |
          wget -O apkeep https://github.com/EFForg/apkeep/releases/download/0.14.0/apkeep-x86_64-unknown-linux-gnu
          chmod +x apkeep
          sudo mv apkeep /usr/local/bin/

      - name: استخراج نام بسته (اگر کاربر لینک داده باشد)
        id: extract
        run: |
          INPUT="${{ inputs.package_name }}"
          INPUT=$(echo "$INPUT" | xargs)
          if [[ "$INPUT" == *"play.google.com"* ]]; then
            PACKAGE=$(echo "$INPUT" | grep -oP '(?<=id=)[^&?]+')
          else
            PACKAGE="$INPUT"
          fi
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "Extracted package: $PACKAGE"

      - name: دریافت توکن ناشناس از AuroraOSS
        run: |
          curl -s 'https://auroraoss.com/api/auth' -H 'Content-Type: application/json' --data-raw '{"email":"","device":"Pixel 6"}' > auth.json
          TOKEN=$(jq -r '.token' auth.json)
          echo "AUTH_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: دانلود APK با apkeep
        run: |
          mkdir -p downloads
          apkeep -a ${{ steps.extract.outputs.package }} -d downloads --token "${{ env.AUTH_TOKEN }}"

      - name: ایجاد ساختار پوشه Google Play/نام برنامه
        run: |
          APP_NAME="${{ steps.extract.outputs.package }}"
          TARGET_DIR="downloads/Google Play/${APP_NAME}"
          mkdir -p "${TARGET_DIR}"
          # جابجایی فایل دانلود شده (پسوند apk یا xapk)
          find downloads -maxdepth 1 -type f \( -name "*.apk" -o -name "*.xapk" -o -name "*.apks" \) -exec mv -v {} "${TARGET_DIR}/" \;

      - name: بارگذاری فایل به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.extract.outputs.package }}
          path: downloads/
