name: Download All VODs from a Kick.com Channel

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Kick channel username (e.g., keoxer)'
        required: true
        type: string
  push:
    branches:
      - "**"

jobs:
  download-all-kick-vods:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'kick-all:')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install ffmpeg and Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
          pip install requests

      - name: Extract username
        id: get-username
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            USERNAME="${{ github.event.inputs.channel }}"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            USERNAME=$(echo "$COMMIT_MSG" | grep -oP 'kick-all:\s*\K.*' | xargs)
            if [ -z "$USERNAME" ]; then
              echo "❌ No username found."
              exit 1
            fi
          fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "🎯 Username: $USERNAME"

      - name: Download all VODs via Kick API + ffmpeg
        run: |
          USERNAME="${{ steps.get-username.outputs.username }}"
          mkdir -p downloads
          python3 << 'EOF'
          import requests, time, subprocess, os, sys, json
          username = os.environ['USERNAME']
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'application/json',
              'Referer': f'https://kick.com/{username}'
          }

          # Get channel ID
          channel_url = f'https://kick.com/api/v2/channels/{username}'
          resp = requests.get(channel_url, headers=headers)
          if resp.status_code != 200:
              print(f"❌ Cannot get channel info: {resp.status_code}")
              sys.exit(1)
          channel_data = resp.json()
          channel_id = channel_data.get('id')
          if not channel_id:
              print("❌ No channel ID found")
              sys.exit(1)
          print(f"✅ Channel ID: {channel_id}")

          # Paginate through VODs
          page = 1
          video_urls = []
          while True:
              vod_url = f'https://kick.com/api/v2/channels/{channel_id}/videos?page={page}&per_page=30'
              resp = requests.get(vod_url, headers=headers)
              if resp.status_code != 200:
                  break
              data = resp.json()
              videos = data.get('data', [])
              if not videos:
                  break
              for video in videos:
                  vod_id = video.get('id')
                  title = video.get('title', 'untitled').replace('/', '_')
                  video_urls.append((vod_id, title))
              print(f"📄 Page {page} fetched, total VODs found so far: {len(video_urls)}")
              if len(videos) < 30:
                  break
              page += 1
              time.sleep(1)

          if not video_urls:
              print("❌ No VODs found for this channel.")
              sys.exit(1)

          print(f"🎬 Found {len(video_urls)} VODs. Starting download...")
          for vod_id, title in video_urls:
              output_file = f"downloads/{title}.mp4"
              if os.path.exists(output_file) and os.path.getsize(output_file) > 1024*1024:
                  print(f"⏭️ Skipping {title} (already exists)")
                  continue
              # Get the source playlist (m3u8)
              source_url = f'https://kick.com/api/v2/videos/{vod_id}/source'
              resp = requests.get(source_url, headers=headers)
              if resp.status_code != 200:
                  print(f"⚠️ Could not get source for {title}, skipping")
                  continue
              source_data = resp.json()
              # The API returns an object with "source" field containing the m3u8 URL
              m3u8 = source_data.get('source')
              if not m3u8:
                  print(f"⚠️ No m3u8 found for {title}")
                  continue
              # Download with ffmpeg
              cmd = ['ffmpeg', '-y', '-i', m3u8, '-c', 'copy', '-bsf:a', 'aac_adtstoasc', output_file]
              print(f"⬇️ Downloading: {title}")
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(f"❌ ffmpeg error for {title}: {result.stderr[:200]}")
              else:
                  print(f"✅ Saved: {output_file}")
              time.sleep(2)  # be gentle
          EOF
          echo "Download process finished."

      - name: Commit and push downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f downloads/
          if git diff --staged --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add VODs for ${{ steps.get-username.outputs.username }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
