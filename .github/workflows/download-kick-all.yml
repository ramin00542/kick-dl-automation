name: Download All VODs from a Kick.com Channel

on:
  # فعال‌سازی اجرای دستی (manual) با ورودی نام کاربری
  workflow_dispatch:
    inputs:
      channel:
        description: 'نام کانال (username) در kick.com'
        required: true
        type: string
        default: 'keoxer'
  # اجرا توسط commit message مثل قبل
  push:
    branches:
      - "**"

jobs:
  download-all-kick-vods:
    # شرط: اگر کار با push است، پیام باید شامل 'kick-all:' باشد
    # اگر manual trigger باشد، بدون شرط اجرا شود
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'kick-all:')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install kick-dl
        run: pip install kick-dl

      - name: Extract username (from commit or manual input)
        id: get-username
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            USERNAME="${{ github.event.inputs.channel }}"
            echo "✅ Manual trigger: channel = $USERNAME"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            USERNAME=$(echo "$COMMIT_MSG" | grep -oP 'kick-all:\s*\K.*' | xargs)
            if [ -z "$USERNAME" ]; then
              echo "❌ No 'kick-all:' found in commit message."
              exit 1
            fi
            echo "✅ Commit trigger: channel = $USERNAME"
          fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT

      - name: Download all VODs
        run: |
          USERNAME="${{ steps.get-username.outputs.username }}"
          echo "🎯 Downloading all VODs for: $USERNAME"
          mkdir -p downloads
          # دانلود تمام ویدیوها (اگر خطایی رخ بده، ادامه بده)
          kick-dl -c "$USERNAME" --download_all -q best -C 3 || echo "⚠️ Download incomplete or no VODs found."
          # انتقال فایل‌های mp4 به پوشه downloads
          mv *.mp4 downloads/ 2>/dev/null || echo "No mp4 files to move."

      - name: Commit and push downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if git diff --staged --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add VODs for ${{ steps.get-username.outputs.username }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
