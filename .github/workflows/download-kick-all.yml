name: Download All VODs from a Kick.com Channel
on:
  push:
    branches:
      - "**"
jobs:
  download-all-kick-vods:
    # این شرط باعث می‌شه فقط وقتی اجرا بشه که پیام commit با عبارت 'kick-all:' شروع بشه
    if: contains(github.event.head_commit.message, 'kick-all:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install kick-dl
        run: pip install kick-dl

      - name: Extract username and download all VODs
        run: |
          commit_msg=$(git log -1 --pretty=%B)
          echo "Commit message: $commit_msg"

          # نام کاربری را از پیام commit استخراج می‌کند
          username=$(echo "$commit_msg" | grep -oP 'kick-all:\s*\K.*' | xargs)
          if [ -z "$username" ]; then
            echo "❌ No username found in commit message."
            exit 1
          fi

          echo "🎯 Username: $username"
          echo "Starting download of all VODs for channel: $username"

          # ایجاد پوشه برای ذخیره ویدیوها
          mkdir -p downloads

          # دانلود تمام ویدیوهای کانال (مشابه دستور kick-dl -c username -a)
          kick-dl -c "$username" --download_all -q best -C 3

          # انتقال تمام فایل‌های دانلود شده به پوشه 'downloads'
          #  Kick-dl معمولاً فایل‌ها را در دایرکتوری فعلی ذخیره می‌کند.
          echo "Moving downloaded files to 'downloads' directory..."
          mv *.mp4 downloads/ 2>/dev/null || echo "No mp4 files found to move."

      - name: Commit and push downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add downloads/
          if git diff --staged --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add all VODs for ${{ env.KICK_USERNAME }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
        env:
          KICK_USERNAME: ${{ steps.extract.outputs.username }}
