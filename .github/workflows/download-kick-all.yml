name: Download All VODs from a Kick.com Channel

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Kick username (bv: keoxer)'
        required: true
        type: string
  push:
    branches:
      - "**"

jobs:
  download-all-kick-vods:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, 'kick-all:')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yt-dlp and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Extract username
        id: get-username
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            USERNAME="${{ github.event.inputs.channel }}"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            USERNAME=$(echo "$COMMIT_MSG" | grep -oP 'kick-all:\s*\K.*' | xargs)
            if [ -z "$USERNAME" ]; then
              echo "❌ No username found."
              exit 1
            fi
          fi
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "🎯 Username: $USERNAME"

      - name: Download all VODs with yt-dlp
        run: |
          USERNAME="${{ steps.get-username.outputs.username }}"
          mkdir -p downloads
          cd downloads
          # Download het volledige kanaal (alle VODs) met yt-dlp
          # Gebruik een betrouwbare user-agent en accepteer self-signed certs
          yt-dlp \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --no-check-certificate \
            --sleep-interval 5 \
            --max-sleep-interval 10 \
            --retries 5 \
            --continue \
            --output "%(title)s.%(ext)s" \
            "https://kick.com/$USERNAME" \
            || echo "⚠️ yt-dlp failed, trying with referer..."
          if [ ! "$(ls -A .)" ]; then
            echo "❌ No videos downloaded. Kick might be blocking us."
            exit 1
          fi
          cd ..

      - name: Commit and push (force add)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f downloads/
          if git diff --staged --quiet; then
            echo "No new files to commit."
          else
            git commit -m "Add VODs for ${{ steps.get-username.outputs.username }} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
